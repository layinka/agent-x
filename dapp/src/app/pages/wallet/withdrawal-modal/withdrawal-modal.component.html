<div class="modal-header">
    <h4 class="modal-title">Withdraw {{ coin.name }}</h4>
    <button type="button" class="close" (click)="activeModal.dismiss()">&times;</button>
  </div>
  <div class="modal-body">
    <form>
      <div class="form-group">
        <label>Amount to Withdraw</label>
        <input type="number" [(ngModel)]="amount" class="form-control" />
        <small *ngIf="amount > balance" class="text-danger">Insufficient balance</small>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button class="btn btn-primary" [disabled]="amount > balance" (click)="withdraw()">Withdraw</button>
    <button class="btn btn-secondary" (click)="activeModal.close()">Cancel</button>
  </div>
